name: Hclyz Live Sync

on:
  schedule:
    - cron: '30 22 * * *' # 北京时间每天早上 6:30 自动抓取更新
  workflow_dispatch: # 留个按钮，支持你在网页端手动点击马上抓取

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests

    - name: Run Spider
      run: python hclyz_spider.py

    - name: Commit and Push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "actions-user"
        git add hclyz_live.txt
        git diff --cached --quiet || (git commit -m "Monitor Sync: $(date +'%Y-%m-%d %H:%M:%S')" && git push)

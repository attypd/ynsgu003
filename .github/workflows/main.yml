name: 15分钟自动扫描对时更新

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Monitor and Scan
        run: python monitor_and_sync.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git pull --rebase origin main  # 关键：解决 Push 冲突
            git commit -m "Monitor Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
